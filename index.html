<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <title>MoneyTracker Pro</title>
    <style>
        :root{--bg:#1a1a2e;--bg2:#16213e;--card:rgba(255,255,255,.08);--txt:#fff;--txt2:rgba(255,255,255,.6);--g:#00b894;--gL:rgba(0,184,148,.15);--d:#e74c3c;--dL:rgba(231,76,60,.15);--a:#3498db;--aL:rgba(52,152,219,.15);--w:#f39c12}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(145deg,var(--bg),var(--bg2));color:var(--txt);min-height:100vh;overflow:hidden}
        
        /* Loader */
        #ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
        #ld.hd{opacity:0;pointer-events:none}
        #ld .ic{font-size:4rem;animation:b 1s infinite}
        #ld .tx{margin-top:1rem;color:var(--txt2)}
        @keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        
        /* Layout */
        #app{display:flex;flex-direction:column;height:100vh}
        .hd{background:rgba(0,0,0,.3);backdrop-filter:blur(10px);padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
        .hd h1{font-size:1.2rem;display:flex;gap:8px}
        .hd-btn{width:40px;height:40px;border-radius:10px;background:var(--card);border:none;color:#fff;font-size:1.3rem;cursor:pointer}
        
        .mn{flex:1;overflow-y:auto;padding:15px;padding-bottom:70px}
        .pg{display:none;animation:fi .3s}
        .pg.act{display:block}
        @keyframes fi{from{opacity:0}to{opacity:1}}
        
        /* Nav */
        nav{position:fixed;bottom:0;left:0;right:0;background:rgba(22,33,62,.95);display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid rgba(255,255,255,.1)}
        nav button{background:none;border:none;color:var(--txt2);font-size:1.3rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
        nav button.on{color:var(--a)}
        nav button span{font-size:.6rem}
        
        /* Composants */
        .cd{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;color:#fff;margin-bottom:8px}
        .btn.g{background:linear-gradient(135deg,var(--g),#00cec9)}
        .btn.d{background:linear-gradient(135deg,var(--d),#c0392b)}
        .btn.o{background:var(--a)}
        
        /* Summary */
        .sum{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
        .sum>div{padding:15px;border-radius:14px;text-align:center}
        .sum .g{background:linear-gradient(135deg,var(--g),#00cec9)}
        .sum .d{background:linear-gradient(135deg,var(--d),#c0392b)}
        .sum .t{background:linear-gradient(135deg,var(--a),#2980b9);grid-column:span 2}
        .sum h3{font-size:.75rem;opacity:.9;margin-bottom:4px}
        .sum .amt{font-size:1.4rem;font-weight:700}
        
        /* Budget */
        .bb{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin:10px 0}
        .bf{height:100%;border-radius:5px;transition:.5s}
        .bf.ok{background:var(--g)}
        .bf.warn{background:var(--w)}
        .bf.dngr{background:var(--d)}
        
        /* Alert */
        .al{background:var(--dL);border-left:4px solid var(--d);padding:12px;border-radius:8px;margin-bottom:12px;display:none;align-items:center;gap:10px}
        .al.sh{display:flex}
        
        /* Transactions */
        .tx{display:flex;align-items:center;padding:10px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:6px}
        .tx-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-right:10px}
        .tx-ic.g{background:var(--gL)}
        .tx-ic.d{background:var(--dL)}
        .tx-inf{flex:1;min-width:0}
        .tx-inf h4{font-size:.9rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tx-inf sm{font-size:.7rem;opacity:.6}
        .tx-am{font-weight:bold;font-size:.9rem}
        .tx-am.g{color:var(--g)}
        .tx-am.d{color:var(--d)}
        
        /* Calendar */
        .cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
        .cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.8rem;background:rgba(255,255,255,.03);position:relative}
        .cal-d.tdy{background:var(--a);font-weight:bold}
        .cal-d.has-d::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--d)}
        .cal-d.has-g::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--g);left:calc(50% - 8px)}
        
        /* Chart */
        #ch{width:100%;height:180px}
        
        /* Modal */
        .mdl-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:flex-end;z-index:200}
        .mdl-bg.act{display:flex}
        .mdl{background:var(--bg2);width:100%;padding:20px;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;animation:sl .3s}
        @keyframes sl{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .mdl h2{text-align:center;margin-bottom:15px}
        .tp-s{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        .tp-b{padding:12px;border:2px solid rgba(255,255,255,.1);border-radius:10px;background:transparent;color:#fff;font-weight:600;cursor:pointer}
        .tp-b.on.g{background:var(--gL);border-color:var(--g);color:var(--g)}
        .tp-b.on.d{background:var(--dL);border-color:var(--d);color:var(--d)}
        .ct-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .ct-b{padding:10px 4px;border:2px solid transparent;border-radius:10px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
        .ct-b.on{border-color:var(--a);background:var(--aL)}
        .ct-b sp{font-size:.6rem}
        input,select{width:100%;padding:12px;border:none;border-radius:10px;background:rgba(255,255,255,.1);color:#fff;margin-bottom:8px;font-size:1rem}
        input:focus{outline:2px solid var(--a)}
        
        /* Toast */
        .tst{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(0,0,0,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;z-index:300;transition:.3s;white-space:nowrap}
        .tst.sh{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

<div id="ld"><div class="ic">💰</div><div class="tx">Chargement...</div></div>

<div id="app">
    <header class="hd">
        <h1>💰 MoneyTracker</h1>
        <div>
            <button class="hd-btn" onclick="expPDF()">📄</button>
            <button class="hd-btn" onclick="go('set')">⚙️</button>
        </div>
    </header>

    <div class="al" id="al"><span style="font-size:1.4rem">🚨</span><div><strong>Alerte Budget!</strong><div id="alT">90% atteint</div></div></div>

    <main class="mn">
        <!-- HOME -->
        <div id="pHome" class="pg act">
            <div class="sum">
                <div class="g"><h3>Revenus</h3><div class="amt" id="sG">0 €</div></div>
                <div class="d"><h3>Dépenses</h3><div class="amt" id="sD">0 €</div></div>
                <div class="t"><h3>Solde</h3><div class="amt" id="sT">0 €</div></div>
            </div>
            <div class="cd">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                    <h3>🎯 Budget</h3>
                    <span id="bP">0%</span>
                </div>
                <div class="bb"><div class="bf ok" id="bF"></div></div>
                <div style="display:flex;justify-content:space-between;font-size:.8rem;opacity:.7">
                    <span id="bS">0 € dépensé</span>
                    <span id="bR">Reste: 0 €</span>
                </div>
            </div>
            <button class="btn g" onclick="oM('g')">➕ Gain</button>
            <button class="btn d" onclick="oM('d')">➖ Dépense</button>
            <h3 style="margin:15px 0 10px">📋 Récent</h3>
            <div id="txL"></div>
        </div>

        <!-- CAL -->
        <div id="pCal" class="pg">
            <div class="cd">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <button class="hd-btn" onclick="cSh(-1)">◀</button>
                    <h3 id="cT"></h3>
                    <button class="hd-btn" onclick="cSh(1)">▶</button>
                </div>
                <div class="cal-g" style="opacity:.5;margin-bottom:4px">
                    <div>Dim</div><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div>
                </div>
                <div class="cal-g" id="cG"></div>
            </div>
        </div>

        <!-- STATS -->
        <div id="pSt" class="pg">
            <div class="cd">
                <h3 style="margin-bottom:10px">📈 Évolution</h3>
                <canvas id="ch"></canvas>
                <div style="display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:.85rem">
                    <span><span style="color:var(--g)">●</span> Gains</span>
                    <span><span style="color:var(--d)">●</span> Dépenses</span>
                </div>
            </div>
            <div class="cd">
                <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>Moyenne dépenses:</span><strong id="stA">0 €</strong></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>Max dépense:</span><strong id="stM">0 €</strong></div>
                <div style="display:flex;justify-content:space-between"><span>Transactions:</span><strong id="stC">0</strong></div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div id="pSet" class="pg">
            <div class="cd">
                <label>🎯 Budget Mensuel</label>
                <input type="number" id="inB" placeholder="Ex: 500000" onchange="svB()">
                <label>💱 Devise</label>
                <select id="inC" onchange="svC()">
                    <option value="€">Euro (€)</option>
                    <option value="Ar">Ariary (Ar)</option>
                    <option value="$">Dollar ($)</option>
                    <option value="£">Livre (£)</option>
                    <option value="CFA">CFA</option>
                </select>
                <button class="btn o" onclick="expPDF()" style="margin-top:10px">📄 Exporter PDF</button>
                <button class="btn d" onclick="clr()">🗑️ Réinitialiser</button>
            </div>
        </div>
    </main>

    <nav>
        <button class="on" onclick="go('Home')">🏠<span>Accueil</span></button>
        <button onclick="go('Cal')">📅<span>Calendrier</span></button>
        <button onclick="go('St')">📊<span>Stats</span></button>
        <button onclick="go('Set')">⚙️<span>Réglages</span></button>
    </nav>
</div>

<!-- Modal -->
<div class="mdl-bg" id="mdl" onclick="if(event.target.id==='mdl')this.classList.remove('act')">
    <div class="mdl" onclick="event.stopPropagation()">
        <h2 id="mT">Ajouter</h2>
        <div class="tp-s">
            <button class="tp-b g" id="tpG" onclick="sTp('g')">💚 Gain</button>
            <button class="tp-b d on" id="tpD" onclick="sTp('d')">❤️ Dépense</button>
        </div>
        <div class="ct-g" id="ctG"></div>
        <input type="number" id="inA" placeholder="Montant" step="any">
        <input type="text" id="inD" placeholder="Description (optionnel)">
        <input type="date" id="inDt">
        <button class="btn d" id="svBt" onclick="svTx()">✅ Enregistrer</button>
    </div>
</div>

<div class="tst" id="tst"></div>

<script>
// === INIT SÉCURISÉ ===
let D={tx:[],cfg:{b:0,c:'€'}},tp='d',cM=new Date(),sC=null;
const CT={
    d:[{i:'🍕',n:'Alimentation'},{i:'🚗',n:'Transport'},{i:'🏠',n:'Logement'},{i:'🎮',n:'Loisirs'},{i:'💊',n:'Santé'},{i:'🛍️',n:'Shopping'},{i:'📄',n:'Factures'},{i:'📦',n:'Autre'}],
    g:[{i:'💼',n:'Salaire'},{i:'💻',n:'Freelance'},{i:'📈',n:'Invest.'},{i:'🎁',n:'Cadeau'},{i:'💰',n:'Autre'}]
};

// Démarrage immédiat avec protection
try{
    let sv=localStorage.getItem('mtp_v6');
    if(sv) D=JSON.parse(sv);
    document.getElementById('inB').value=D.cfg.b||'';
    document.getElementById('inC').value=D.cfg.c;
    up();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
}catch(e){console.error(e)}

// Force l'affichage après 1.5s max
setTimeout(()=>document.getElementById('ld').classList.add('hd'),1500);

function up(){
    try{
        // Calculs
        let n=new Date(),mT=D.tx.filter(t=>{let d=new Date(t.dt);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()});
        let g=mT.filter(t=>t.tp==='g').reduce((s,t)=>s+t.am,0);
        let d=mT.filter(t=>t.tp==='d').reduce((s,t)=>s+t.am,0);
        
        // UI
        document.getElementById('sG').textContent=fm(g);
        document.getElementById('sD').textContent=fm(d);
        document.getElementById('sT').textContent=fm(g-d);
        
        // Budget
        let b=D.cfg.b||0,p=b>0?(d/b)*100:0;
        document.getElementById('bP').textContent=Math.round(p)+'%';
        document.getElementById('bS').textContent=fm(d)+' dépensé';
        document.getElementById('bR').textContent='Reste: '+fm(Math.max(0,b-d));
        let f=document.getElementById('bF');
        f.style.width=Math.min(p,100)+'%';
        f.className='bf '+(p>=100?'dngr':p>=80?'warn':'ok');
        
        // Alert
        let al=document.getElementById('al');
        if(b>0&&p>=90){al.classList.add('sh');document.getElementById('alT').textContent=p>=100?'Dépassé!':Math.round(p)+'% utilisé';}else al.classList.remove('sh');
        
        // Liste
        let l=document.getElementById('txL');
        if(D.tx.length===0) l.innerHTML='<div style="text-align:center;opacity:.5;padding:20px">Vide</div>';
        else l.innerHTML=D.tx.slice(0,10).map(t=>`
            <div class="tx">
                <div class="tx-ic ${t.tp==='g'?'g':'d'}">${t.i}</div>
                <div class="tx-inf"><h4>${t.ds||t.n}</h4><sm>${t.n} • ${fd(t.dt)}</sm></div>
                <div class="tx-am ${t.tp==='g'?'g':'d'}">${t.tp==='g'?'+':'-'}${fm(t.am)}</div>
                <button onclick="del(${t.id})" style="background:none;border:none;cursor:pointer">🗑️</button>
            </div>
        `).join('');
        
        // Stats
        let dA=mT.filter(t=>t.tp==='d');
        document.getElementById('stA').textContent=fm(dA.length?dA.reduce((s,t)=>s+t.am,0)/dA.length:0);
        document.getElementById('stM').textContent=fm(dA.length?Math.max(...dA.map(x=>x.am)):0);
        document.getElementById('stC').textContent=D.tx.length;
        
        drCh();
    }catch(e){console.error(e)}
}

function go(p){document.querySelectorAll('.pg').forEach(x=>x.classList.remove('act'));document.getElementById('p'+p).classList.add('act');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));event.target.closest('button').classList.add('on');if(p==='Cal')drCal();if(p==='St')drCh();}
function fm(n){return n.toFixed(2)+' '+D.cfg.c}
function fd(d){return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}

// Modal
function oM(t){
    tp=t;sC=null;
    document.getElementById('mdl').classList.add('act');
    document.getElementById('mT').textContent=t==='g'?'➕ Gain':'➖ Dépense';
    document.getElementById('svBt').className='btn '+(t==='g'?'g':'d');
    document.getElementById('inDt').value=new Date().toISOString().split('T')[0];
    document.getElementById('inA').value='';
    document.getElementById('inD').value='';
    sTp(t);
}
function sTp(t){
    tp=t;
    document.getElementById('tpG').classList.toggle('on',t==='g');
    document.getElementById('tpD').classList.toggle('on',t==='d');
    document.getElementById('ctG').innerHTML=CT[t].map(c=>`
        <button class="ct-b ${sC===c.i?'on':''}" onclick="sCt('${c.i}','${c.n}')">
            <span style="font-size:1.5rem">${c.i}</span>
            <span>${c.n}</span>
        </button>
    `).join('');
}
function sCt(i,n){sC={i,n};sTp(tp);}
function svTx(){
    let a=parseFloat(document.getElementById('inA').value),ds=document.getElementById('inD').value,dt=document.getElementById('inDt').value;
    if(!a||a<=0||!sC){shT('❌ Invalide');return}
    D.tx.unshift({id:Date.now(),tp:tp,am:a,n:sC.n,i:sC.i,ds:ds,dt:dt||new Date().toISOString().split('T')[0]});
    sv();up();document.getElementById('mdl').classList.remove('act');shT('✅ OK');
}
function del(id){if(confirm('Supprimer?')){D.tx=D.tx.filter(t=>t.id!==id);sv();up();shT('🗑️ Supprimé')}}

// Calendrier
function drCal(){
    let t=cT.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    document.getElementById('cT').textContent=t.charAt(0).toUpperCase()+t.slice(1);
    let g=document.getElementById('cG'),f=new Date(cM.getFullYear(),cM.getMonth(),1),l=new Date(cM.getFullYear(),cM.getMonth()+1,0);
    let h='';
    for(let i=0;i<f.getDay();i++)h+='<div class="cal-d"></div>';
    for(let i=1;i<=l.getDate();i++){
        let td=new Date().toDateString()===new Date(cM.getFullYear(),cM.getMonth(),i).toDateString();
        let ds=`${cM.getFullYear()}-${String(cM.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        let tD=D.tx.some(t=>t.dt===ds&&t.tp==='d');
        let tG=D.tx.some(t=>t.dt===ds&&t.tp==='g');
        h+=`<div class="cal-d${td?' tdy':''}${tD?' has-d':''}${tG?' has-g':''}">${i}</div>`;
    }
    g.innerHTML=h;
}
function cSh(d){cM.setMonth(cM.getMonth()+d);drCal()}

// Graph
function drCh(){
    let cv=document.getElementById('ch'),cx=cv.getContext('2d');
    cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;cx.scale(2,2);
    let w=cv.offsetWidth,h=cv.offsetHeight;
    cx.clearRect(0,0,w,h);
    
    let lbs=[],dG=[],dD=[],mx=100;
    for(let i=5;i>=0;i--){
        let dt=new Date();dt.setMonth(dt.getMonth()-i);
        lbs.push(dt.toLocaleDateString('fr-FR',{month:'short'}));
        let mT=D.tx.filter(t=>{let d=new Date(t.dt);return d.getMonth()===dt.getMonth()&&d.getFullYear()===dt.getFullYear()});
        let g=mT.filter(t=>t.tp==='g').reduce((s,t)=>s+t.am,0);
        let d=mT.filter(t=>t.tp==='d').reduce((s,t)=>s+t.am,0);
        dG.push(g);dD.push(d);
        mx=Math.max(mx,g,d);
    }
    
    let pd=30,gw=w-pd*2,gh=h-pd*2,sx=gw/5;
    
    function dLn(dt,cl){
        cx.strokeStyle=cl;cx.lineWidth=2;cx.beginPath();
        dt.forEach((v,i)=>{let x=pd+sx*i,y=h-pd-(v/mx*gh);i===0?cx.moveTo(x,y):cx.lineTo(x,y)});
        cx.stroke();
        dt.forEach((v,i)=>{cx.beginPath();cx.arc(pd+sx*i,h-pd-(v/mx*gh),3,0,Math.PI*2);cx.fillStyle=cl;cx.fill()});
    }
    dLn(dG,'#00b894');dLn(dD,'#e74c3c');
    
    cx.fillStyle='rgba(255,255,255,.5)';cx.font='10px sans-serif';cx.textAlign='center';
    lbs.forEach((l,i)=>cx.fillText(l,pd+sx*i,h-8));
}

// Settings
function svB(){D.cfg.b=parseFloat(document.getElementById('inB').value)||0;sv();up();shT('✅ Budget')}
function svC(){D.cfg.c=document.getElementById('inC').value;sv();up();shT('✅ Devise')}
function clr(){if(confirm('Tout supprimer?')){D={tx:[],cfg:{b:0,c:'€'}};sv();up();document.getElementById('inB').value='';document.getElementById('inC').value='€';shT('🗑️ Réinit.')}}
function sv(){localStorage.setItem('mtp_v6',JSON.stringify(D))}
function shT(m){let t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

// PDF Export Robuste
function expPDF(){
    try{
        let c='%PDF-1.4\n1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj\n2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj\n';
        let s='BT /F1 16 Tf 50 750 Td (MoneyTracker Pro) Tj ET\nBT /F1 12 Tf 50 720 Td (Budget: '+fm(D.cfg.b)+') Tj ET\n';
        let g=D.tx.filter(t=>t.tp==='g').reduce((a,t)=>a+t.am,0);
        let d=D.tx.filter(t=>t.tp==='d').reduce((a,t)=>a+t.am,0);
        s+='BT /F1 12 Tf 50 700 Td (Gains: '+fm(g)+') Tj ET\nBT /F1 12 Tf 50 680 Td (Depenses: '+fm(d)+') Tj ET\n';
        let y=640;
        D.tx.slice(0,30).forEach(t=>{s+='BT /F1 10 Tf 50 '+y+' Td ('+t.dt+' '+(t.tp==='g'?'+':'-')+' '+t.n+' '+fm(t.am)+') Tj ET\n';y-=15;});
        c+='4 0 obj<</Length '+s.length+'>>stream\n'+s+'endstream endobj\n';
        c+='3 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>endobj\n';
        c+='5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj\nxref\n0 6\n0000000000 65535 f \n0000000009 00000 n \n0000000058 00000 n \n0000000350 00000 n \n0000000115 00000 n \n0000000450 00000 n \ntrailer<</Size 6/Root 1 0 R>>\nstartxref\n550\n%%EOF';
        
        let b=new Blob([c],{type:'application/pdf'});
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='MoneyTracker_Rapport.pdf';
        a.click();
        shT('📄 PDF Exporté');
    }catch(e){shT('❌ Erreur PDF');console.error(e)}
}
